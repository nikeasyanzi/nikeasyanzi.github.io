# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://nikeasyanzi.github.io/"
title: Craig Yang's Blog
subtitle: "分享技術、生活與學習的點滴"
author: "Craig Yang"
copyright: "© [PaperMod Contributors](https://github.com/adityatelange/hugo-PaperMod/graphs/contributors)"
theme: hugo-PaperMod
disqusShortname: nikeasyanzi

enableInlineShortcodes: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

languageCode: "en" # Default language code
defaultContentLanguage: "en" # Default language for the site
defaultContentLanguageInSubdir: true # Put default language in its own subdirectory (/en)

params:
  env: production
  comments: true
  disqusShortname: nikeasyanzi
  googleAnalytics: "G-JD7S8N753Z"

  # SEO: Site-level keywords (rendered on the home page)
  keywords:
    - DevOps
    - self-hosting
    - observability
    - Docker
    - Linux
    - Python
    - CI/CD
    - tech blog

  # SEO: Google Search Console verification
  # Replace YOUR_VERIFICATION_CODE with the code from Google Search Console
  analytics:
    google:
      SiteVerificationTag: "9cP3nJntOeTy8CZw1obpJyKpPJWz1KWw73O5QmWZerU"

  # 添加搜索参数，参考 https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    includeMatches: true
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

minify:
  disableXML: true
  # minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 5

languages:
  en:
    languageName: "English"
    languageAltTitle: "EN" # Alternative short title
    weight: 1 # Lower weight = higher priority
    contentDir: "content/en" # Directory for English posts
    menu:
      main:
        - name: About
          url: about/
          weight: 1
        - name: Archive
          url: archives
          weight: 5
        - name: Search
          url: search/
          weight: 10
        - name: Tags
          url: tags/
          weight: 10
        - name: Posts
          url: /en/posts/
          weight: 10
    params:
      description: "English version of the blog"
      profileMode:
        enabled: false
        title: PaperMod
        imageUrl: "https://raw.githubusercontent.com/googlefonts/noto-emoji/master/svg/emoji_u1f9d1_1f3fb_200d_1f4bb.svg"
        imageTitle: ProfileMode image
        # imageWidth: 120
        # imageHeight: 120
        subtitle: "☄️ Fast | ☁️ Self-learning | 🌙 Self-hosting | 📱 Linux"
        buttons:
          - name: About Me
            url: https://github.com/adityatelange/hugo-PaperMod/wiki/Features#profile-mode
      socialIcons:
        - name: github
          url: "https://github.com/nikeasyanzi/"
        - name: linkedin
          url: "https://www.linkedin.com/in/craig-yang-6b911784/"
        - name: email
          url: "mailto:shangjr520@gmail"

  tw:
    languageName: "繁體中文"
    languageAltTitle: "TW" # Alternative short title
    weight: 2
    contentDir: "content/tw" # Directory for Chinese posts
    menu:
      main:
        - name: About
          url: about/
          weight: 1
        - name: Archive
          url: archives/
          weight: 5
        - name: Posts
          url: /tw/posts/
          weight: 10
        - name: Search
          url: search/
          weight: 10
        - name: Tags
          url: tags/
          weight: 10
    params:
      description: "中文版部落格"
      socialIcons:
        - name: github
          url: "https://github.com/nikeasyanzi/"
        - name: linkedin
          url: "https://www.linkedin.com/in/craig-yang-6b911784/"
        - name: email
          url: "mailto:shangjr520@gmail"

# Permalinks for posts
permalinks:
  post: "/:year/:month/:title/" # Customize URL structure for posts

# Enable RSS, sitemap, etc.
enableRobotsTXT: true
#enableGitInfo: true

# Taxonomies (optional)
taxonomies:
  category: "categories"
  tag: "tags"
  search: "search"

outputs:
  home:
    - HTML
    - RSS
    - JSON

services:
  youtube:
    disableInlineCSS: true
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
